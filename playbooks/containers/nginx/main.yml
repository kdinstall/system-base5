- hosts: localhost
  connection: local
  become: true

  vars:
    container_name: "nginx-server"
    container_port: "8081"
    host_html_dir: "/opt/nginx/html"
    host_conf_dir: "/opt/nginx/conf.d"
    docker_network: "app-network"

  tasks:
    - name: Create Docker network (if not exists)
      command: docker network create {{ docker_network }}
      register: network_result
      failed_when: false
      changed_when: network_result.rc == 0

    - name: Create HTML directory
      file:
        path: "{{ host_html_dir }}"
        state: directory
        mode: '0755'

    - name: Create Nginx config directory
      file:
        path: "{{ host_conf_dir }}"
        state: directory
        mode: '0755'

    - name: Create SSL certificate directory
      file:
        path: "/opt/nginx/ssl"
        state: directory
        mode: '0755'

    - name: Check if SSL certificate exists
      stat:
        path: "/opt/nginx/ssl/server.crt"
      register: ssl_cert_check

    - name: Generate self-signed SSL certificate
      command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
        -keyout /opt/nginx/ssl/server.key
        -out /opt/nginx/ssl/server.crt
        -subj "/C=JP/ST=Tokyo/L=Tokyo/O=Development/CN=app.example.com"
      when: not ssl_cert_check.stat.exists

    - name: Set SSL certificate file permissions
      file:
        path: "{{ item }}"
        mode: '0644'
      loop:
        - "/opt/nginx/ssl/server.crt"
        - "/opt/nginx/ssl/server.key"
      when: not ssl_cert_check.stat.exists

    - name: Create sample index.html
      copy:
        dest: "{{ host_html_dir }}/index.html"
        content: |
          <!DOCTYPE html>
          <html>
          <head><title>Nginx</title></head>
          <body>
            <h1>Welcome to Nginx!</h1>
            <p>This is a sample page served by Nginx container.</p>
          </body>
          </html>
        mode: '0644'

    - name: Create default Nginx config
      copy:
        dest: "{{ host_conf_dir }}/default.conf"
        content: |
          server {
              listen 80 default_server;
              server_name _;
              root /usr/share/nginx/html;
              index index.html;
              
              location / {
                  try_files $uri $uri/ =404;
              }
          }
        mode: '0644'

    - name: Check if Nginx container already exists
      command: docker inspect {{ container_name }}
      register: container_check
      failed_when: false

    - name: Remove existing Nginx container if exists
      command: docker rm -f {{ container_name }}
      when: container_check.rc == 0
      register: remove_result
      failed_when: false

    - name: Run Nginx container
      command: >
        docker run -d 
        --name {{ container_name }}
        --network {{ docker_network }}
        -p {{ container_port }}:80
        -p 443:443
        -v {{ host_html_dir }}:/usr/share/nginx/html:ro
        -v {{ host_conf_dir }}:/etc/nginx/conf.d
        -v /opt/nginx/ssl:/etc/nginx/ssl:ro
        --restart unless-stopped
        nginx:latest
      register: docker_result
      failed_when: false

    - name: Show container status
      debug:
        msg: |
          Nginx container started successfully.
          Container name: {{ container_name }}
          HTTP Access: http://localhost:{{ container_port }}
          HTTPS Access: https://localhost
          Network: {{ docker_network }}
          Config directory: {{ host_conf_dir }}
          HTML directory: {{ host_html_dir }}
          SSL directory: /opt/nginx/ssl
          Note: Self-signed certificate will show browser warning (safe to accept for development)
      when: docker_result.rc == 0

    - name: Show error if container already exists
      debug:
        msg: "Container may already exist. Try: docker rm {{ container_name }}"
      when: docker_result.rc != 0
