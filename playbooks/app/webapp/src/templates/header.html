{{ define "header" }}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .page_title }} - {{ .app_name }}</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg-gray-50 min-h-screen antialiased">

  <!-- Preline Navbar -->
  <header class="flex flex-wrap sm:justify-start sm:flex-nowrap w-full bg-white border-b border-gray-200 text-sm py-3 sticky top-0 z-50 shadow-xs">
    <nav class="max-w-7xl w-full mx-auto px-4 flex flex-wrap basis-full items-center justify-between">
      <!-- ブランドロゴ -->
      <a href="/containers"
         class="flex items-center gap-x-2 text-lg font-bold text-blue-600 hover:text-blue-700 focus:outline-hidden focus:opacity-80 transition-opacity">
        <span class="material-symbols-outlined" style="font-size:32px">deployed_code</span>
        {{ .app_name }}
      </a>

      <!-- ナビゲーションメニュー -->
      <div class="flex items-center gap-x-1">
        <a href="/containers"
           class="py-2 px-3 inline-flex items-center gap-x-1.5 text-sm font-medium rounded-lg {{ if eq .active_page "containers" }}bg-blue-50 text-blue-600{{ else }}text-gray-600 hover:bg-gray-50{{ end }} transition-colors">
          <span class="material-symbols-outlined" style="font-size:18px">view_list</span>
          コンテナ一覧
        </a>
        <a href="/install"
           class="py-2 px-3 inline-flex items-center gap-x-1.5 text-sm font-medium rounded-lg {{ if eq .active_page "install" }}bg-blue-50 text-blue-600{{ else }}text-gray-600 hover:bg-gray-50{{ end }} transition-colors">
          <span class="material-symbols-outlined" style="font-size:18px">download</span>
          インストール
        </a>
      </div>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
{{ end }}
